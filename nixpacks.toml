[phases.setup]
nixPkgs = ["nodejs", "python3"]

[phases.install]
# Instalamos en la raíz por si acaso y luego en el frontend
cmds = [
  "if [ -f frontend/package.json ]; then cd frontend && npm install; else npm install; fi"
]

[phases.build]
# Construimos buscando la carpeta correcta
cmds = [
  "if [ -d frontend ]; then cd frontend && npm run build; else npm run build; fi"
]

[start]
# Arrancamos detectando la ruta
cmd = "if [ -d frontend ]; then cd frontend && npm run dev -- --host 0.0.0.0 --port $PORT; else npm run dev -- --host 0.0.0.0 --port $PORT; fi"
